services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/index.html:/usr/share/nginx/html/index.html:ro
      - ./gateway/register.html:/usr/share/nginx/html/register.html:ro
      - ./docs:/usr/share/nginx/html/docs:ro
      - ./gateway/certs:/etc/nginx/certs:ro
    depends_on:
      - hotel-1
      - hotel-2
      - restaurant-1
      - restaurant-2
      - restaurant-3
      - flight-1
      - car-rental-1
      - tour-guide-1
      - museum-1
    restart: unless-stopped

  # ── Hotel (2 instances) ──────────────────────────────────────────────

  hotel-1:
    build:
      context: ./Hotel
      args:
        BASE_PATH: /hotel-1/
    environment:
      API_KEY: hotel-1-key-abc123
    restart: unless-stopped

  hotel-2:
    build:
      context: ./Hotel
      args:
        BASE_PATH: /hotel-2/
    environment:
      API_KEY: hotel-2-key-def456
    restart: unless-stopped

  # ── Restaurant (3 instances) ─────────────────────────────────────────

  restaurant-1:
    build:
      context: ./Resturant
      args:
        BASE_PATH: /restaurant-1/
    environment:
      API_KEY: restaurant-1-key-ghi789
    restart: unless-stopped

  restaurant-2:
    build:
      context: ./Resturant
      args:
        BASE_PATH: /restaurant-2/
    environment:
      API_KEY: restaurant-2-key-jkl012
    restart: unless-stopped

  restaurant-3:
    build:
      context: ./Resturant
      args:
        BASE_PATH: /restaurant-3/
    environment:
      API_KEY: restaurant-3-key-mno345
    restart: unless-stopped

  # ── Flight (1 instance) ─────────────────────────────────────────────

  flight-1:
    build:
      context: ./Flight
      args:
        BASE_PATH: /flight-1/
    environment:
      API_KEY: flight-1-key-pqr678
    restart: unless-stopped

  # ── Car Rental (1 instance) ─────────────────────────────────────────

  car-rental-1:
    build:
      context: ./CarRental
      args:
        BASE_PATH: /car-rental-1/
    environment:
      API_KEY: car-rental-1-key-stu901
    restart: unless-stopped

  # ── Tour Guide (1 instance) ─────────────────────────────────────────

  tour-guide-1:
    build:
      context: ./TourGuide
      args:
        BASE_PATH: /tour-guide-1/
    environment:
      API_KEY: tour-guide-1-key-vwx234
    restart: unless-stopped

  # ── Museum (1 instance) ─────────────────────────────────────────────

  museum-1:
    build:
      context: ./Museum
      args:
        BASE_PATH: /museum-1/
    environment:
      API_KEY: museum-1-key-yza567
    restart: unless-stopped
