services:
  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - hotel
      - restaurant
      - flight
      - car-rental
      - tour-guide
      - museum
    restart: unless-stopped

  hotel:
    build:
      context: ./Hotel
      args:
        BASE_PATH: /hotel/
    restart: unless-stopped

  restaurant:
    build:
      context: ./Resturant
      args:
        BASE_PATH: /restaurant/
    restart: unless-stopped

  flight:
    build:
      context: ./Flight
      args:
        BASE_PATH: /flight/
    restart: unless-stopped

  car-rental:
    build:
      context: ./CarRental
      args:
        BASE_PATH: /car-rental/
    restart: unless-stopped

  tour-guide:
    build:
      context: ./TourGuide
      args:
        BASE_PATH: /tour-guide/
    restart: unless-stopped

  museum:
    build:
      context: ./Museum
      args:
        BASE_PATH: /museum/
    restart: unless-stopped
