server {
    listen 80;
    listen 443 ssl;
    server_name hacketon-18march-api.orcaplatform.ai _;

    ssl_certificate /etc/nginx/certs/orcaplatform.crt;
    ssl_certificate_key /etc/nginx/certs/orcaplatform.key;

    root /usr/share/nginx/html;
    index index.html;

    # ── Hotel instances ────────────────────────────────────────────────

    location /hotel-1/ {
        proxy_pass http://hotel-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    location /hotel-2/ {
        proxy_pass http://hotel-2:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    # ── Restaurant instances ───────────────────────────────────────────

    location /restaurant-1/ {
        proxy_pass http://restaurant-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    location /restaurant-2/ {
        proxy_pass http://restaurant-2:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    location /restaurant-3/ {
        proxy_pass http://restaurant-3:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    # ── Flight ─────────────────────────────────────────────────────────

    location /flight-1/ {
        proxy_pass http://flight-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    # ── Car Rental ─────────────────────────────────────────────────────

    location /car-rental-1/ {
        proxy_pass http://car-rental-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    # ── Tour Guide ─────────────────────────────────────────────────────

    location /tour-guide-1/ {
        proxy_pass http://tour-guide-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    # ── Museum ─────────────────────────────────────────────────────────

    location /museum-1/ {
        proxy_pass http://museum-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    # ── Registration API ──────────────────────────────────────────────

    location = /register-api/register {
        proxy_pass http://registration:8000/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /register-api/health {
        proxy_pass http://registration:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /register-api/ {
        proxy_pass http://registration:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Landing page ──────────────────────────────────────────────────

    location /docs/ {
        try_files $uri $uri/ =404;
    }

    location = / {
        return 302 /docs/index.html;
    }

    location = /register {
        try_files /register.html =404;
    }

    location = /register/ {
        try_files /register.html =404;
    }
}
