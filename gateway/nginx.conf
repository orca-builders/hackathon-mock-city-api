server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Hotel instances ────────────────────────────────────────────────

    location /hotel-1/ {
        proxy_pass http://hotel-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /hotel-2/ {
        proxy_pass http://hotel-2:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Restaurant instances ───────────────────────────────────────────

    location /restaurant-1/ {
        proxy_pass http://restaurant-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /restaurant-2/ {
        proxy_pass http://restaurant-2:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /restaurant-3/ {
        proxy_pass http://restaurant-3:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Flight ─────────────────────────────────────────────────────────

    location /flight-1/ {
        proxy_pass http://flight-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Car Rental ─────────────────────────────────────────────────────

    location /car-rental-1/ {
        proxy_pass http://car-rental-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Tour Guide ─────────────────────────────────────────────────────

    location /tour-guide-1/ {
        proxy_pass http://tour-guide-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Museum ─────────────────────────────────────────────────────────

    location /museum-1/ {
        proxy_pass http://museum-1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Landing page ──────────────────────────────────────────────────

    location = / {
        try_files /index.html =404;
    }

    location = /register {
        try_files /register.html =404;
    }

    location = /register/ {
        try_files /register.html =404;
    }
}
