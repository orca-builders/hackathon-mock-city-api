server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /hotel/ {
        proxy_pass http://hotel:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /restaurant/ {
        proxy_pass http://restaurant:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /flight/ {
        proxy_pass http://flight:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /car-rental/ {
        proxy_pass http://car-rental:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /tour-guide/ {
        proxy_pass http://tour-guide:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /museum/ {
        proxy_pass http://museum:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = / {
        try_files /index.html =404;
    }
}
